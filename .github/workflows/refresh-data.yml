name: Refresh data

on:
  schedule:
    - cron: '0 */3 * * *'  # every 3 hours UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: pip install --quiet requests

      - name: Refresh 39-city snapshot (Open-Meteo)
        run: python3 build_snapshot_cities.py
        continue-on-error: true

      - name: Refresh OpenAQ stations
        env:
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
        run: python3 fetch_openaq.py
        continue-on-error: true

      - name: Refresh Weather Union ground sensors
        env:
          WEATHER_UNION_KEY: ${{ secrets.WEATHER_UNION_KEY }}
        run: python3 discover_weatherunion.py
        continue-on-error: true

      - name: Refresh multi-source comparison (39 cities × 12 sources)
        env:
          WEATHER_UNION_KEY: ${{ secrets.WEATHER_UNION_KEY }}
          OPEN_INDIA_TEMP_UA: 'india-heat-map github-actions (ashwask)'
        run: python3 india_temp_pull.py --locations all_cities.csv --quiet
        continue-on-error: true

      - name: Refresh 0.25° heat grid (resumes from partial)
        run: timeout 900 python3 grid.py --resolution 0.25 --chunk 100 --sleep 11 || true
        continue-on-error: true

      - name: Commit + push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in snapshot_cities.json stations_openaq.json stations_weatherunion.json india_temp_readings.json india_grid_weather.json india_grid_weather.partial.jsonl; do
            [ -f "$f" ] && git add "$f" || true
          done
          if git diff --staged --quiet; then
            echo "no data changes this cycle"
          else
            git commit -m "auto: data refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
